<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Maaki Games</title>
  </head>
  <body style="text-align: center">
    <canvas id="unity-canvas" width=1280 height=600 style="width: 1280px; height: 600px; background: #FFF480"></canvas>
    <script src="Build/i.asm.loader.js"></script>
    <script>
      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/i.data",
        frameworkUrl: "Build/i.asm.framework.js",
        codeUrl: "Build/i.asm.js",
        memoryUrl: "Build/i.asm.mem",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MAAKI",
        productName: "Maaki Games",
        productVersion: "0.071",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
  </body>
