<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Markulie | Smooth Follow for Unity</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="smoothfollow/TemplateData/style.css">
</head>
<body>

<div style="text-align: center; font-size: 12pt; margin: 15px auto 70px auto; max-width: 100%; font-family: sans-serif;">
    <a href="https://markulie.github.io/" style="color:white">
        MARKULIE
    </a>
</div>

<div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>
    <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
    <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
    </div>
</div>
<script>
    var buildUrl = "smoothfollow/Build";
    var loaderUrl = buildUrl + "/smoothfollow.loader.js";
    var config = {
        dataUrl: buildUrl + "/smoothfollow.data",
        frameworkUrl: buildUrl + "/smoothfollow.framework.js",
        codeUrl: buildUrl + "/smoothfollow.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Markulie",
        productName: "SmoothFollow",
        productVersion: "0.2",
    };

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
    } else {
        canvas.style.width = "1200px";
        canvas.style.height = "800px";
    }
    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
            loadingBar.style.display = "none";
            fullscreenButton.onclick = () => {
                unityInstance.SetFullscreen(1);
            };
        }).catch((message) => {
            alert(message);
        });
    };
    document.body.appendChild(script);
</script>
</body>
</html>
