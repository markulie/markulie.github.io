<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Markaelie | Smooth Follow for Unity</title>
    <link rel="icon" type="image/png" sizes="16x16" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAAXNSR0IArs4c6QAAALtJREFUOE9jZMABns1R/I8sJZVynxGbUqyC6JrPT4Vo9T6PaQiGAbg0w2xHNwTFAHTNIE0w25Gdj2wI3ABsmmGakA0xzIaIwsIEbABMMzaFuAIZZgjcAGxOhdmGyxCQKxix2Q7TgM0AmEUwObINAFkCMgRuAHqI43M+sitQDMAXYLjksAai++nbWNXvNFWFi4NcCA5EdJV//vxByQPo8iwsLCh6iDbg1QJVBrGE2wy0NwDkZHRv4LIdpBYARBVgmQB5TwsAAAAASUVORK5CYII=" />
    <link rel="stylesheet" href="TemplateData/style.css">
</head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">SmoothFollow</div>
      </div>
    </div>
    <script>
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/smoothfollow.loader.js";
      var config = {
        dataUrl: buildUrl + "/smoothfollow.data",
        frameworkUrl: buildUrl + "/smoothfollow.framework.js",
        codeUrl: buildUrl + "/smoothfollow.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Markaelie",
        productName: "SmoothFollow",
        productVersion: "1.0",
      };

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1;
      } else {
        canvas.style.width = "1200px";
        canvas.style.height = "800px";
      }
      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
