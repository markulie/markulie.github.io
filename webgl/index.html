<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap" rel="stylesheet">
  
    <title>Maaki Blackjack</title>
</head>
<body>








    <h1 class="logo"></h1>

    <div class="menu">

        <a href="">MAAKI&nbsp;</a>
       <a href="">WHITEPAPER&nbsp;</a>
        <a href="">NEWS&nbsp;</a>
        <a href="">SUPPORT&nbsp;</a>
    </div>


        <div class="webgl-wrapper">
            <div class="aspect"></div>
            <div class="webgl-content">
                <div id="unityContainer">
                    <canvas id="unity-canvas" style="background: green"></canvas>
                </div>
            </div>
        </div>


    <div class="info">
        <p>unity webgl responsive</p>
        <p>press F or <a href="#" onclick="myGameInstance.SetFullscreen(1)">click here</a> to toggle fullscreen</p>
    </div>


    <script src="MyLoader.js"></script>
    <script>
        createUnityInstance(document.querySelector("#unity-canvas"), {
            dataUrl: "Build/webgl.data",
            frameworkUrl: "Build/webgl.asm.framework.js",
            codeUrl: "Build/webgl.asm.js",
            memoryUrl: "Build/webgl.asm.mem",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "markusikus",
            productName: "Makki Blackjack",
            productVersion: "0.033",
        }).then((unityInstance) => {
            myGameInstance = unityInstance;
        });
    </script>

    <!-- check for F key press to toggle full screen -->
    <script>
        var isFullscreen = false;

        document.addEventListener('keydown', function (event) {
            if (event.which === 70) {
                if (!isFullscreen) {
                    myGameInstance.SetFullscreen(1);
                } else {
                    myGameInstance.SetFullscreen(0);
                }
                isFullscreen = !isFullscreen;
            }
        });
    </script>
</body>
</html>
